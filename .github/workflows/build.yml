name: Build Live ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LB_CONFIG: config
      ISO_NAME: "azazel"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso isolinux syslinux-utils live-build

      - name: Dir Configuracion
        run: |
          mkdir -p config/binary
          echo "$ISO_NAME" > config/binary/image_name
          echo "bookworm" > config/distribution
          echo "amd64" > config/architecture

      - name: Generar iso
        run: |
          sudo lb clean
          sudo lb build

      - name: Upload ISO to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: live-image-amd64.hybrid.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}