name: Construccion azazel.iso

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap squashfs-tools debian-archive-keyring \
            xorriso isolinux syslinux syslinux-efi \
            grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools

      - name: Configurar live-build
        run: |
          set -e
          sudo chmod -R +x config/hooks/ || true
          sudo lb clean --all

          sudo lb config \
            --distribution trixie \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/" \
            --mirror-chroot-security "http://security.debian.org/debian-security/" \
            --mirror-binary-security "http://security.debian.org/debian-security/" \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --architectures amd64 \
            --debian-installer none \
            --apt-secure false \
            --security true

      - name: Construir ISO
        run: |
          set -e
          sudo lb build

      - name: Verificar ISO generada
        run: |
          set -e
          find . -name "*.iso" -ls
          ISO_PATH=$(find . -type f -name "*.iso" | head -n1)

          if [ -z "$ISO_PATH" ]; then
            echo "[ERROR] No se ha generado ninguna ISO"
            exit 1
          fi

          echo "ISO_PATH=$ISO_PATH" >> $GITHUB_ENV

      - name: Crear release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: azazel-${{ github.run_number }}
          release_name: Azazel ISO ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Subir ISO al release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.ISO_PATH }}
          asset_name: azazel-${{ github.run_number }}.iso
          asset_content_type: application/octet-stream