name: Contruccion azazel.iso
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias (con reintentos)
        run: |
          set -e
          for i in 1 2 3; do \
            sudo apt-get update && \
            sudo apt-get install -y live-build debootstrap squashfs-tools debian-archive-keyring && break || sleep 10; \
          done
          sudo sed -i '/ubuntu/d' /etc/apt/sources.list || true
          sudo rm -f /etc/apt/sources.list.d/*ubuntu* || true

      - name: Configurar y construir (con reintentos)
        run: |
          set -e
          sudo chmod -R +x config/hooks/
          sudo lb clean --all
          sudo lb config --distribution trixie \
                         --mirror-bootstrap "http://deb.debian.org/debian/" \
                         --mirror-binary "http://deb.debian.org/debian/" \
                         --archive-areas "main contrib non-free non-free-firmware" \
                         --binary-images iso-hybrid \
                         --architectures amd64 \
                         --debian-installer live
          export LB_SECURITY="false"
          for i in 1 2 3; do \
            sudo lb build && break || sleep 10; \
          done



      - name: Listar todos los archivos tras build
        run: |
          ls -lhR .


      - name: Crear release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: azazel-${{ github.run_number }}
          release_name: Azazel ISO ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Subir ISO al release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: $(find . -type f -name '*.iso' | head -n1)
          asset_name: azazel-${{ github.run_number }}.iso
          asset_content_type: application/octet-stream